name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Publish package
        run: npm publish --access public --provenance

  build-binaries:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: node20-linux-x64
            archive: arena-linux-amd64.tar.gz
          - os: ubuntu-latest
            target: node20-linux-arm64
            archive: arena-linux-arm64.tar.gz
          - os: macos-latest
            target: node20-macos-x64
            archive: arena-darwin-amd64.tar.gz
          - os: macos-latest
            target: node20-macos-arm64
            archive: arena-darwin-arm64.tar.gz
          - os: windows-latest
            target: node20-win-x64
            archive: arena-windows-amd64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          npx @yao-pkg/pkg dist/cli.js --targets "${{ matrix.target }}" --output release/arena
          tar -C release -czf "release/${{ matrix.archive }}" arena

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          npx @yao-pkg/pkg dist/cli.js --targets "${{ matrix.target }}" --output release/arena.exe
          Compress-Archive -Path release/arena.exe -DestinationPath "release/${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.archive }}
          path: release/${{ matrix.archive }}

  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - publish-npm
      - build-binaries
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: release-assets/**/*
